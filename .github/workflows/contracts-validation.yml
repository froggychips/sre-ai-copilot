name: contracts-validation

on:
  pull_request:
    paths:
      - 'contracts/**'
      - 'app/contracts/**'
      - 'scripts/validate_contracts.py'
      - 'tests/contracts/**'
      - 'requirements.in'
      - 'requirements.txt'
      - '.github/workflows/contracts-validation.yml'
  push:
    branches: [ main, master ]
    paths:
      - 'contracts/**'
      - 'app/contracts/**'
      - 'scripts/validate_contracts.py'
      - 'tests/contracts/**'

jobs:
  validate-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate contract schemas and sample payloads
        run: python scripts/validate_contracts.py

      - name: Run contract tests
        run: pytest -q tests/contracts
