apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-ai-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sre-ai-api
  template:
    metadata:
      labels:
        app: sre-ai-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
      - name: api
        image: froggychips/sre-ai-copilot:latest
        ports:
        - containerPort: 8000
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        envFrom:
        - secretRef:
            name: sre-ai-secrets
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -d
            - "$(DATABASE_URL)"
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 256Mi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sre-ai-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: nginx
spec:
  tls:
  - hosts:
    - sre-ai.example.com
    secretName: sre-ai-tls
  rules:
  - host: sre-ai.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sre-ai-api
            port:
              number: 8000
