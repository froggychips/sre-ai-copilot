version: '3.8'

services:
  api:
    build: .
    container_name: sre-ai-api
    ports:
      - "8000:8000"
    env_file: .env
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      - redis
    volumes:
      - .:/app
      - ~/.kube:/root/.kube:ro

  worker:
    build: .
    container_name: sre-ai-worker
    command: python -m app.workers.tasks
    env_file: .env
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    depends_on:
      - redis
    volumes:
      - .:/app
      - ~/.kube:/root/.kube:ro

  redis:
    image: redis:7-alpine
    container_name: sre-ai-redis
    ports:
      - "6379:6379"
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
