version: '3.8'

services:
  api:
    build: .
    container_name: sre-ai-api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - ~/.kube:/root/.kube:ro

  worker:
    build: .
    container_name: sre-ai-worker
    command: python -m app.workers.tasks
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - ~/.kube:/root/.kube:ro

  redis:
    image: redis:7-alpine
    container_name: sre-ai-redis
    ports:
      - "6379:6379"
